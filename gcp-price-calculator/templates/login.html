<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — GCP Billing Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#06090f;--surface:#0d1117;--surface2:#131922;--border:#1e2d3d;
  --accent:#00e5ff;--accent2:#7c3aed;--green:#00ff87;--red:#ff4d6d;
  --text:#e2e8f0;--muted:#64748b;
  --mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
/* animated grid background */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  animation:gridPan 20s linear infinite;
}
@keyframes gridPan{from{background-position:0 0}to{background-position:40px 40px}}

/* glow orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.15;pointer-events:none}
.orb1{width:400px;height:400px;background:var(--accent);top:-100px;left:-100px}
.orb2{width:300px;height:300px;background:var(--accent2);bottom:-80px;right:-80px}

.login-wrap{
  position:relative;z-index:10;
  width:100%;max-width:420px;padding:20px;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(0,229,255,0.05);
}
.brand{text-align:center;margin-bottom:36px}
.brand-icon{
  width:56px;height:56px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 16px;
  box-shadow:0 0 30px rgba(0,229,255,0.3);
}
.brand h1{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.brand p{font-size:13px;color:var(--muted)}

.field{margin-bottom:18px}
.field label{
  display:block;font-family:var(--mono);font-size:10px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;margin-bottom:8px;
}
.field input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);padding:12px 16px;
  font-size:14px;font-family:var(--sans);outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,229,255,0.1);
}
.field input::placeholder{color:var(--muted)}

.btn-login{
  width:100%;padding:13px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#0099ff);
  color:#000;font-size:15px;font-weight:600;font-family:var(--sans);
  cursor:pointer;transition:all 0.2s;margin-top:8px;
  letter-spacing:0.3px;
}
.btn-login:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,255,0.25)}
.btn-login:active{transform:translateY(0)}

.error-box{
  background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);
  color:#fca5a5;border-radius:10px;padding:12px 16px;
  font-size:13px;margin-bottom:20px;display:flex;align-items:center;gap:8px;
}
.footer-note{
  text-align:center;margin-top:28px;
  font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;
}
.divider{
  height:1px;background:var(--border);margin:24px 0;
  position:relative;
}
.divider span{
  position:absolute;left:50%;transform:translateX(-50%);top:-8px;
  background:var(--surface);padding:0 10px;
  font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">☁</div>
      <h1>GCP Billing Tool</h1>
      <p>Sign in to access your discount calculator</p>
    </div>

    {% if error %}
    <div class="error-box">
      <span>⚠</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{ request.args.get('next', '') }}"/>
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" autocomplete="username" required autofocus/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="divider"><span>SECURE</span></div>
    <div class="footer-note">Credentials managed via PostgreSQL</div>
  </div>
</div>
</body>
</html>
